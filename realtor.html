<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HOMI - Realtor View · 142 Maple Ridge Drive</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root {
    --green-dark: #1C4A2E;
    --green-mid: #2D6A4F;
    --green-pale: #D8F3DC;
    --cream: #FAF6F0;
    --gold: #C9963A;
    --amber: #D97706;
    --red: #C0392B;
    --text: #1A1A1A;
    --muted: #8A8A8A;
    --border: #E4DDD3;
    --white: #ffffff;
    --shadow-sm: 0 1px 3px rgba(28,74,46,0.08);
    --shadow-md: 0 4px 16px rgba(28,74,46,0.10);
    --shadow-lg: 0 8px 32px rgba(28,74,46,0.13);
    --radius: 12px;
    --radius-sm: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── NAV ── */
  .nav {
    background: var(--green-dark);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }
  .nav-brand {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 10px;
  }
  .nav-brand-dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; }
  .nav-actions { display: flex; align-items: center; gap: 12px; }
  .nav-badge {
    background: var(--gold);
    color: var(--white);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .btn-print {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.4);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-print:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.7); }

  /* ── PROPERTY HEADER ── */
  .property-header {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
    padding: 36px 40px 32px;
    color: var(--white);
    position: relative;
    overflow: hidden;
  }
  .property-header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 260px; height: 260px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .property-header::after {
    content: '';
    position: absolute;
    bottom: -40px; right: 120px;
    width: 160px; height: 160px;
    background: rgba(201,150,58,0.12);
    border-radius: 50%;
  }
  .ph-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .ph-address { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin-bottom: 6px; }
  .ph-sub { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 20px; }
  .ph-stats { display: flex; gap: 28px; flex-wrap: wrap; }
  .ph-stat { display: flex; flex-direction: column; gap: 2px; }
  .ph-stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.55); }
  .ph-stat-value { font-size: 18px; font-weight: 600; color: var(--white); }
  .ph-stat-value.gold { color: var(--gold); }

  /* Score Gauge */
  .score-gauge {
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 20px 24px;
    text-align: center;
    min-width: 160px;
    backdrop-filter: blur(8px);
    position: relative; z-index: 1;
  }
  .score-number { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 700; color: var(--gold); line-height: 1; }
  .score-denom { font-size: 18px; color: rgba(255,255,255,0.5); }
  .score-label { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
  .score-confidence {
    display: inline-block;
    background: rgba(201,150,58,0.25);
    color: var(--gold);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 10px;
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Verified Badge */
  .homi-verified {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green-pale);
    color: var(--green-dark);
    font-size: 11px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 12px;
  }
  .homi-verified-icon { font-size: 13px; }

  /* ── TABS ── */
  .tabs-bar {
    background: var(--white);
    border-bottom: 2px solid var(--border);
    padding: 0 40px;
    display: flex;
    gap: 0;
    overflow-x: auto;
    position: sticky;
    top: 60px;
    z-index: 90;
    box-shadow: var(--shadow-sm);
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 14px 20px 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    margin-bottom: -2px;
  }
  .tab-btn:hover { color: var(--green-mid); }
  .tab-btn.active { color: var(--green-dark); border-bottom-color: var(--green-dark); font-weight: 600; }

  /* ── MAIN LAYOUT ── */
  .main { padding: 32px 40px 60px; max-width: 1200px; }

  /* ── CARDS ── */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-bottom: 24px;
    box-shadow: var(--shadow-sm);
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--green-dark);
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .card-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 22px; }
  .section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── STRENGTHS / FLAGS ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

  .strength-item, .flag-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    line-height: 1.5;
  }
  .strength-item { background: #F0FAF2; border: 1px solid #B7DFC0; }
  .flag-item { background: #FEF7EC; border: 1px solid #F5D08A; }
  .flag-item.urgent { background: #FEF0EF; border-color: #F2B3B0; }
  .item-icon { font-size: 16px; margin-top: 1px; flex-shrink: 0; }
  .item-text { color: var(--text); }
  .item-note { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ── PRICE RANGE ── */
  .price-range-bar {
    margin: 18px 0 8px;
    position: relative;
    height: 8px;
    background: linear-gradient(90deg, #FDEBD0, #D8F3DC);
    border-radius: 4px;
  }
  .price-range-marker {
    position: absolute;
    top: -4px;
    transform: translateX(-50%);
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2.5px solid var(--white);
    box-shadow: 0 0 0 2px currentColor;
  }
  .price-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }
  .price-sweet {
    text-align: center;
    margin-top: 12px;
    font-size: 15px;
    font-weight: 600;
    color: var(--green-dark);
  }
  .price-sweet span { color: var(--gold); font-size: 22px; }

  /* ── COMPS ── */
  .comps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 800px) { .comps-grid { grid-template-columns: 1fr; } }

  .comp-card {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 18px 18px 16px;
    position: relative;
    transition: box-shadow 0.2s;
  }
  .comp-card:hover { box-shadow: var(--shadow-md); }
  .comp-card.subject { border-color: var(--green-mid); background: #F6FDF8; }
  .comp-subject-tag {
    position: absolute;
    top: -10px; left: 16px;
    background: var(--green-dark);
    color: var(--white);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .comp-address { font-weight: 600; font-size: 14px; margin-bottom: 4px; color: var(--text); }
  .comp-meta { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .comp-score-row { display: flex; align-items: center; justify-content: space-between; }
  .comp-score {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
  }
  .comp-score.good { color: var(--green-mid); }
  .comp-score.fair { color: var(--amber); }
  .comp-score.subject-score { color: var(--gold); }
  .comp-score-label { font-size: 11px; color: var(--muted); }
  .comp-price { font-size: 15px; font-weight: 600; color: var(--text); }
  .comp-price-label { font-size: 11px; color: var(--muted); }
  .comp-inspection-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 10px;
    margin-top: 10px;
    display: inline-block;
  }
  .badge-inspected { background: var(--green-pale); color: var(--green-dark); }
  .badge-not-inspected { background: #F5F5F5; color: var(--muted); }
  .sample-disclaimer {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin-top: 16px;
    padding: 8px 12px;
    background: #F8F8F6;
    border-radius: 6px;
    border-left: 3px solid var(--border);
  }

  /* ── DISCLOSURE CHECKLIST ── */
  .disclosure-section { margin-bottom: 20px; }
  .disclosure-section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    padding: 6px 12px;
    border-radius: 6px;
    display: inline-block;
  }
  .disc-required { background: #FDEAEA; color: var(--red); }
  .disc-recommended { background: #FEF7EC; color: #92540A; }
  .disc-optional { background: var(--green-pale); color: var(--green-dark); }

  .disclosure-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    margin-bottom: 8px;
    background: var(--white);
    transition: background 0.15s;
  }
  .disclosure-item:hover { background: #FAFAF8; }
  .disclosure-checkbox {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    appearance: none;
    -webkit-appearance: none;
    background: var(--white);
    transition: all 0.15s;
    position: relative;
  }
  .disclosure-checkbox:checked {
    background: var(--green-mid);
    border-color: var(--green-mid);
  }
  .disclosure-checkbox:checked::after {
    content: '✓';
    position: absolute;
    top: -1px; left: 2px;
    color: white;
    font-size: 12px;
    font-weight: 700;
  }
  .disclosure-text { flex: 1; }
  .disclosure-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .disclosure-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .disclosure-note {
    margin-top: 6px;
    padding: 6px 10px;
    background: #F8F8F6;
    border-radius: 6px;
    font-size: 12px;
    color: var(--muted);
    border: 1px solid var(--border);
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    resize: none;
    outline: none;
  }
  .disclosure-note:focus { border-color: var(--green-mid); background: var(--white); }
  .generate-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--green-dark);
    color: var(--white);
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 20px;
  }
  .generate-btn:hover { background: var(--green-mid); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .disclosure-output {
    margin-top: 16px;
    padding: 16px 18px;
    background: #F6FDF8;
    border: 1.5px solid var(--green-pale);
    border-radius: var(--radius-sm);
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--text);
  }

  /* ── DOM PREDICTOR ── */
  .dom-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px; }
  @media (max-width: 700px) { .dom-grid { grid-template-columns: 1fr; } }

  .dom-card {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 20px;
    text-align: center;
    position: relative;
    transition: all 0.2s;
  }
  .dom-card:hover { box-shadow: var(--shadow-md); }
  .dom-card.featured { border-color: var(--gold); background: linear-gradient(135deg, #FFFBF2, #FFF8E8); }
  .dom-scenario { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px; font-weight: 600; }
  .dom-days { font-family: 'Playfair Display', serif; font-size: 44px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .dom-days.red { color: var(--red); }
  .dom-days.amber { color: var(--amber); }
  .dom-days.green { color: var(--green-mid); }
  .dom-days-label { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .dom-price { font-size: 15px; font-weight: 600; color: var(--text); }
  .dom-price-note { font-size: 11px; color: var(--muted); }
  .dom-bar-wrap { margin-top: 12px; height: 6px; background: #F0EDE9; border-radius: 3px; overflow: hidden; }
  .dom-bar { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

  .dom-visual {
    margin: 20px 0;
    padding: 16px;
    background: #F8F8F6;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .dom-visual-title { font-size: 12px; color: var(--muted); margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
  .dom-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    font-size: 13px;
  }
  .dom-row-label { width: 170px; flex-shrink: 0; color: var(--text); font-weight: 500; }
  .dom-row-bar-wrap { flex: 1; height: 28px; background: #EDEAE5; border-radius: 4px; overflow: hidden; position: relative; }
  .dom-row-bar {
    height: 100%;
    border-radius: 4px;
    display: flex; align-items: center;
    padding-left: 10px;
    color: var(--white);
    font-size: 12px;
    font-weight: 600;
    transition: width 0.8s ease;
  }
  .dom-disclaimer {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin-top: 12px;
    padding: 8px 12px;
    background: #F8F8F6;
    border-radius: 6px;
    border-left: 3px solid var(--border);
  }

  /* ── SELLER PREP / OBJECTIONS ── */
  .prep-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    margin-bottom: 10px;
    background: var(--white);
    transition: box-shadow 0.2s;
  }
  .prep-item:hover { box-shadow: var(--shadow-sm); }
  .prep-rank {
    width: 28px; height: 28px;
    background: var(--green-pale);
    color: var(--green-dark);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    flex-shrink: 0;
  }
  .prep-rank.urgent { background: #FDEAEA; color: var(--red); }
  .prep-content { flex: 1; }
  .prep-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .prep-detail { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .prep-roi { font-size: 12px; font-weight: 600; color: var(--green-mid); margin-top: 4px; }
  .prep-cost { font-size: 12px; color: var(--amber); }

  .objection-item {
    padding: 16px 18px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    margin-bottom: 12px;
    background: var(--white);
  }
  .objection-q { font-size: 14px; font-weight: 600; color: var(--red); margin-bottom: 8px; display: flex; gap: 8px; }
  .objection-a { font-size: 13px; color: var(--text); line-height: 1.6; }
  .objection-a strong { color: var(--green-dark); }

  /* ── AI ADVISOR ── */
  .ai-advisor {
    background: linear-gradient(135deg, #0F2A1A, #1C4A2E);
    border-radius: var(--radius);
    padding: 28px 32px;
    color: var(--white);
    margin-bottom: 24px;
  }
  .ai-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .ai-subtitle { font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 20px; }
  .ai-prompts { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .ai-prompt-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.85);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .ai-prompt-btn:hover { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.4); color: var(--white); }
  .ai-input-row { display: flex; gap: 10px; }
  .ai-input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .ai-input::placeholder { color: rgba(255,255,255,0.4); }
  .ai-input:focus { border-color: var(--gold); background: rgba(255,255,255,0.12); }
  .ai-send-btn {
    background: var(--gold);
    border: none;
    color: var(--white);
    padding: 12px 22px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .ai-send-btn:hover { background: #b8852f; transform: translateY(-1px); }
  .ai-send-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .ai-response {
    margin-top: 20px;
    padding: 18px 20px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.75;
    color: rgba(255,255,255,0.9);
    white-space: pre-wrap;
  }
  .ai-response-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .ai-thinking {
    display: flex; align-items: center; gap: 8px;
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    padding: 16px 0;
  }
  .dot-pulse { display: flex; gap: 4px; }
  .dot-pulse span {

// ── SPARKLINE ─────────────────────────────────────────────────────
function Sparkline({ data, color = 'var(--green-mid)', width = 60, height = 24 }) {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * (width - 4) + 2;
    const y = height - 2 - ((v - min) / range) * (height - 4);
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width={width} height={height} className="spark">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={pts.split(' ').slice(-1)[0].split(',')[0]} cy={pts.split(' ').slice(-1)[0].split(',')[1]} r="2.5" fill={color} />
    </svg>
  );
}

function ScoreRing({ score }) {
  const r = 40, cx = 50, cy = 50;
  const circ = 2 * Math.PI * r;
  const dash = (score / 100) * circ;
  return (
    <svg width="100" height="100" viewBox="0 0 100 100">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="8" />
      <circle
        cx={cx} cy={cy} r={r} fill="none"
        stroke="#C9963A" strokeWidth="8"
        strokeDasharray={`${dash} ${circ - dash}`}
        strokeDashoffset={circ * 0.25}
        strokeLinecap="round"
        style={{ transition: 'stroke-dasharray 1s ease' }}
      />
      <text x="50" y="54" textAnchor="middle" fill="white" fontSize="22" fontWeight="700" fontFamily="Playfair Display, serif">{score}</text>
    </svg>
  );
}

function DisclosureChecklist() {
  const [checked, setChecked] = useState({});
  const [notes, setNotes] = useState({});
  const [output, setOutput] = useState('');

  const toggle = id => setChecked(p => ({ ...p, [id]: !p[id] }));
  const setNote = (id, val) => setNotes(p => ({ ...p, [id]: val }));

  const generate = () => {
    const lines = [`DISCLOSURE SUMMARY - 142 Maple Ridge Drive, Allentown PA 18104`, `Generated: ${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`, ``, `REQUIRED DISCLOSURES`];
    DISCLOSURES.required.forEach(d => {
      lines.push(`[${checked[d.id] ? 'X' : ' '}] ${d.title}`);
      lines.push(`    ${d.detail}`);
      if (notes[d.id]) lines.push(`    Seller note: ${notes[d.id]}`);
    });
    lines.push(``, `RECOMMENDED DISCLOSURES`);
    DISCLOSURES.recommended.forEach(d => {
      lines.push(`[${checked[d.id] ? 'X' : ' '}] ${d.title}`);
      lines.push(`    ${d.detail}`);
      if (notes[d.id]) lines.push(`    Seller note: ${notes[d.id]}`);
    });
    lines.push(``, `OPTIONAL (TRUST-BUILDING) DISCLOSURES`);
    DISCLOSURES.optional.forEach(d => {
      lines.push(`[${checked[d.id] ? 'X' : ' '}] ${d.title}`);
      if (notes[d.id]) lines.push(`    Seller note: ${notes[d.id]}`);
    });
    lines.push(``, `--- HOMI Verified · March 2026 Full Inspection on Record ---`);
    setOutput(lines.join('\n'));
  };

  const renderSection = (items, labelClass, labelText) => (
    <div className="disclosure-section">
      <span className={`disclosure-section-title ${labelClass}`}>{labelText}</span>
      {items.map(d => (
        <div className="disclosure-item" key={d.id}>
          <input type="checkbox" className="disclosure-checkbox" checked={!!checked[d.id]} onChange={() => toggle(d.id)} />
          <div className="disclosure-text">
            <div className="disclosure-title">{d.title}</div>
            {d.detail && <div className="disclosure-detail">{d.detail}</div>}
            <textarea
              className="disclosure-note"
              placeholder="Add note for disclosure document…"
              rows={1}
              value={notes[d.id] || ''}
              onChange={e => setNote(d.id, e.target.value)}
            />
          </div>
        </div>
      ))}
    </div>
  );

  return (
    <div className="fade-in">
      <div className="card">
        <div className="card-title">📝 Disclosure Preparation Checklist</div>
        <div className="card-subtitle">Items the seller should disclose based on HOMI record - organized by disclosure type</div>
        {renderSection(DISCLOSURES.required, 'disc-required', '🔴 Required Disclosure')}
        {renderSection(DISCLOSURES.recommended, 'disc-recommended', '🟡 Recommended Disclosure')}
        {renderSection(DISCLOSURES.optional, 'disc-optional', '✅ Optional - Builds Trust')}
        <button className="generate-btn" onClick={generate}>
          <span>📄</span> Generate Disclosure Summary
        </button>
        {output && (
          <div className="disclosure-output fade-in">
            <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--green-mid)', marginBottom: 10 }}>Generated Disclosure Summary</div>
            {output}
          </div>
        )}
      </div>
    </div>
  );
}

function AIAdvisor() {
  const [input, setInput] = useState('');
  const [response, setResponse] = useState('');
  const [loading, setLoading] = useState(false);
  const [history, setHistory] = useState([]);

  const quickPrompts = [
    "How do I present this score to my seller?",
    "What's my negotiation exposure?",
    "How do I defend the list price?",
    "Draft a listing description",
    "What should seller fix first?",
    "How do I use the school ratings?",
    "Is the market timing good right now?",
    "How do I address the nearby development?",
  ];

  const ask = async (question) => {
    if (!question.trim()) return;
    setLoading(true);
    setResponse('');
    const newHistory = [...history, { role: 'user', content: question }];
    try {
      const res = await fetch("/.netlify/functions/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: AI_SYSTEM,
          messages: newHistory,
        }),
      });
      const data = await res.json();
      const text = data.content?.[0]?.text || "Sorry, I couldn't generate a response. Please try again.";
      setResponse(text);
      setHistory([...newHistory, { role: 'assistant', content: text }]);
    } catch (e) {
      setResponse("Connection error. Please check your internet and try again.");
    }
    setLoading(false);
    setInput('');
  };

  return (
    <div className="ai-advisor fade-in">
      <div className="ai-title">
        <span style={{ fontSize: 20 }}>✦</span> HOMI AI Realtor Advisor
      </div>
      <div className="ai-subtitle">Powered by Claude · Context-aware for 142 Maple Ridge Drive</div>

      <div className="ai-prompts">
        {quickPrompts.map((p, i) => (
          <button key={i} className="ai-prompt-btn" onClick={() => ask(p)}>{p}</button>
        ))}
      </div>

      <div className="ai-input-row">
        <input
          className="ai-input"
          placeholder="Ask anything about this listing…"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && ask(input)}
        />
        <button className="ai-send-btn" onClick={() => ask(input)} disabled={loading || !input.trim()}>
          {loading ? '…' : 'Ask →'}
        </button>
      </div>

      {loading && (
        <div className="ai-thinking">
          <div className="dot-pulse"><span /><span /><span /></div>
          Analyzing property context…
        </div>
      )}

      {response && !loading && (
        <div className="ai-response fade-in">
          <div className="ai-response-label">✦ HOMI Advisor Response</div>
          {response}
        </div>
      )}
    </div>
  );
}
