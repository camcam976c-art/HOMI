function ContractorTracker(){
  const [quotes,setQuotes] = useState(DEFAULT_QUOTES);
  const [showForm,setShowForm] = useState(false);
  const [form,setForm] = useState({system:"",contractor:"",amount:"",date:"",status:"pending"});

  const save = ()=>{
    if(!form.system||!form.contractor) return;
    if(editId){
      setQuotes(prev=>prev.map(q=>q.id===editId?{...form,id:editId,amount:Number(form.amount)||0}:q));

    }
    setForm({system:"",contractor:"",amount:"",date:"",status:"pending"});
    setShowForm(false);
  };

  const startEdit = q=>{
    setForm({system:q.system,contractor:q.contractor,amount:q.amount||"",date:q.date,status:q.status});
    setEditId(q.id);
    setShowForm(true);
  };

  const grouped = quotes.reduce((acc,q)=>{
    if(!acc[q.system]) acc[q.system]=[];
    acc[q.system].push(q);
    return acc;
  },{});

  const isLowest = q=>{
    const sys = quotes.filter(x=>x.system===q.system&&x.amount>0);
    return sys.length>1 && q.amount===Math.min(...sys.map(x=>x.amount));
  };

  return(
    <div style={{marginBottom:48}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12,marginBottom:20}}>
        <div>
          <p style={S.label}>Contractor Estimates</p>
          <h2 style={{...S.h2,marginTop:4}}>How Do I Get This Done?</h2>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>{setEditId(null);setForm({system:"",contractor:"",amount:"",date:"",status:"pending"});setShowForm(!showForm)}}
            style={{...S.btn("#1C4A2E","#fff"),fontSize:14}}>+ Add Quote</button>
        </div>
      </div>

      {showForm&&(
        <div style={{...S.card({border:"1px solid #52B788",background:"#F0FDF4"}),marginBottom:20,animation:"fadeUp .3s ease"}}>
          <p style={{fontSize:15,fontWeight:600,marginBottom:16,color:"#1C4A2E"}}>{editId?"Edit Quote":"New Contractor Quote"}</p>
          <div className="grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {[["System","system","text","e.g. Water Heater"],["Contractor Name","contractor","text","Company or individual"],["Quote Amount ($)","amount","number","0"],["Date","date","date",""]].map(([label,field,type,ph])=>(
              <div key={field}>
                <p style={{...S.label,marginBottom:5}}>{label}</p>
                <input value={form[field]} onChange={e=>setForm(p=>({...p,[field]:e.target.value}))} type={type} placeholder={ph}
                  style={{width:"100%",padding:"10px 12px",border:"1px solid #E4DDD3",borderRadius:8,fontSize:14,background:"#fff",outline:"none",transition:"border .2s"}}/>
              </div>
            ))}
            <div>
              <p style={{...S.label,marginBottom:5}}>Status</p>
              <select value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))}
                style={{width:"100%",padding:"10px 12px",border:"1px solid #E4DDD3",borderRadius:8,fontSize:14,background:"#fff",outline:"none"}}>
                {Object.entries(STATUS_CFG).map(([v,{label}])=><option key={v} value={v}>{label}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:16}}>
            <button onClick={save} style={S.btn("#1C4A2E","#fff")}>{editId?"Update Quote":"Save Quote"}</button>
            <button onClick={()=>{setShowForm(false);setEditId(null)}} style={S.btn("transparent","#8A8A8A","1px solid #E4DDD3")}>Cancel</button>
          </div>
        </div>
      )}

      <div style={S.card()}>
        {Object.keys(grouped).length===0&&<p style={{color:"#8A8A8A",fontSize:14,textAlign:"center",padding:24}}>No quotes yet. Add your first quote above.</p>}
        {Object.entries(grouped).map(([sys,qs])=>(
          <div key={sys} style={{marginBottom:20}}>
            <p style={{fontSize:13,fontWeight:700,color:"#1C4A2E",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #F0E9DC"}}>{sys}</p>
            <div className="table-scroll">
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:400}}>
                <thead>
                  <tr>
                    {["Contractor","Quote","Date","Status",""].map(h=>(
                      <th key={h} style={{textAlign:"left",padding:"8px 10px",fontSize:11,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",color:"#8A8A8A"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {qs.map(q=>{
                    const cfg=STATUS_CFG[q.status]||STATUS_CFG.pending;
                    const lowest=isLowest(q);
                    return(
                      <tr key={q.id} style={{borderBottom:"1px solid #F7F5F2"}}>
                        <td style={{padding:"10px 10px",fontSize:14}}>{q.contractor}</td>
                        <td style={{padding:"10px 10px"}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:15,fontWeight:700,color:"#1C4A2E"}}>{q.amount?fmt(q.amount):"Ã¢ÂÂ"}</span>
                            {lowest&&<span style={{...S.tag("#D8F3DC","#2D6A4F"),fontSize:10}}>Lowest</span>}
                          </div>
                        </td>
                        <td style={{padding:"10px 10px",fontSize:13,color:"#8A8A8A"}}>{q.date||"Ã¢ÂÂ"}</td>
                        <td style={{padding:"10px 10px"}}><span style={{...S.tag(cfg.bg,cfg.color),fontSize:11}}>Ã¢ÂÂ {cfg.label}</span></td>
                        <td style={{padding:"10px 10px"}}>
                          <div style={{display:"flex",gap:6}}>
                            <button onClick={()=>startEdit(q)} style={{...S.btnSm("transparent","#2D6A4F","1px solid #D8F3DC"),fontSize:11,padding:"3px 8px"}}>Edit</button>
                            <button onClick={()=>setQuotes(prev=>prev.filter(x=>x.id!==q.id))} style={{...S.btnSm("transparent","#C0392B","1px solid #FDECEA"),fontSize:11,padding:"3px 8px"}}>ÃÂ</button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        ))}
        <HomiGuidance text="Getting 3 quotes for any job over $1,000 is standard practice. Your quotes are saved automatically and persist between sessions. HOMI highlights the lowest quote per system."/>
      </div>
    </div>
  );
}

/* Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂ PRINT STYLESHEET */
function PrintStyles(){
  useEffect(()=>{
    const style = document.createElement("style");
    style.textContent=`
      @media print {
        @page { margin: 1.5cm; size: A4; }
        body { font-size: 11pt; }
        .card-pad { padding: 16px !important; }
        h2 { font-size: 18pt !important; }
        h3 { font-size: 14pt !important; }
      }
    `;
    document.head.appendChild(style);
    return()=>document.head.removeChild(style);
  },[]);
  return null;
}
