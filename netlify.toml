# ─────────────────────────────────────────────
#  HOMI — Netlify configuration
# ─────────────────────────────────────────────

[build]
  publish = "."          # all HTML files live at the root
  functions = "netlify/functions"

# ── Clean URLs ──────────────────────────────
# Lets you use /buyer instead of /buyer.html etc.
[[redirects]]
  from = "/buyer"
  to   = "/buyer.html"
  status = 200

[[redirects]]
  from = "/realtor"
  to   = "/realtor.html"
  status = 200

[[redirects]]
  from = "/inspector"
  to   = "/inspector.html"
  status = 200

[[redirects]]
  from = "/spend-planner"
  to   = "/spend-planner.html"
  status = 200

[[redirects]]
  from = "/supply-chain"
  to   = "/supply-chain.html"
  status = 200

[[redirects]]
  from = "/exterior"
  to   = "/exterior.html"
  status = 200

# ── Security headers ────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Cache: static assets ────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
