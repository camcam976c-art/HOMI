<script type="text/babel">
const { useState, useEffect } = React;
const C = { green:'#1C4A2E', greenMid:'#2D6A4F', greenLight:'#52B788', greenPale:'#D8F3DC', cream:'#F7F3EE', creamDark:'#EDE7DD', gold:'#C9963A', goldLight:'#E8B84B', text:'#1C1C1C', textMid:'#4A4A4A', textMuted:'#8A8A8A', border:'#E0D8CF', red:'#C0392B', redPale:'#FDEDEC', amber:'#D97706', amberPale:'#FEF3C7' };

function ScoreRing({ score, size=54, stroke=5 }) {
  const r = (size-stroke*2)/2, circ = 2*Math.PI*r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform:'rotate(-90deg)', flexShrink:0 }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.16)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.gold} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={circ*(1-score/100)} strokeLinecap="round"/>
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central" style={{ transform:`rotate(90deg)`, transformOrigin:`${size/2}px ${size/2}px`, fontFamily:"'Playfair Display',Georgia,serif", fontSize:size*0.29, fontWeight:700, fill:'white' }}>{score}</text>

  );
}

function AIAdvisor() {
  const [input, setInput] = useState('');
  const [answer, setAnswer] = useState('');
  const [loading, setLoading] = useState(false);
  const ask = async (q) => {
    const question = q || input;
    if (!question.trim()) return;
    setLoading(true); setAnswer(''); setInput(question);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000,
          system:`You are HOMI, a warm home advisor. The homeowner is at 142 Maple Ridge Dr., Allentown PA. Built 2004, 2847 sqft, score 72/100. Systems: Water Heater age 9 urgent, HVAC age 8 attention, Electrical age 12 attention, Roof age 12 good. Answer warmly and concisely in 2-4 sentences.`,
          messages:[{ role:'user', content:question }] }),
      });
      const data = await res.json();
      setAnswer(data.content?.[0]?.text || 'Sorry, I had trouble with that. Try again.');
    } catch { setAnswer('Having trouble connecting. Try again in a moment.'); }
    setLoading(false);
  };
  return (
    <div className="ai-panel">
      <div className="ai-header">
        <div className="ai-header-row">
          <div className="ai-icon">🏠</div>
          <div><div className="ai-title">HOMI Advisor</div><div className="ai-subtitle">AI · Knows your home</div></div>

      </div>
      {(loading || answer) && (
        <div className="ai-answer">
          {loading ? <p className="ai-loading">Thinking about your home…</p> : (<><div className="ai-answer-label">HOMI Advisor</div><p>{answer}</p></>)}
        </div>
      )}
      <div className="ai-input-area">

          <button className="ai-send" onClick={() => ask()} disabled={loading}>Ask</button>
        </div>
        <p className="ai-note">Powered by your real home data — systems, age, and HOMI score.</p>
      </div>
    </div>
  );
}

function Tasks({ tasks, setTasks }) {
  const toggle = id => setTasks(tasks.map(t => t.id===id ? { ...t, done:!t.done } : t));
  const now = tasks.filter(t => t.urgency==='now' && !t.done);
  const soon = tasks.filter(t => t.urgency==='soon' && !t.done);
  const watch = tasks.filter(t => t.urgency==='watch' && !t.done);
  const done = tasks.filter(t => t.done);
  const completedPts = done.reduce((s,t) => s+t.pts, 0);
  const Group = ({ label, items, color }) => items.length===0 ? null : (
    <div className="card" style={{ marginBottom:12 }}>
      <p style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.8px', color, marginBottom:9 }}>{label} &mdash; {items.length} remaining</p>
      <ul className="task-list">
        {items.map(t => (
          <li key={t.id} className="task-item">
            <div style={{ display:'flex', alignItems:'flex-start', gap:9 }}>
              <input type="checkbox" checked={t.done} onChange={() => toggle(t.id)} aria-label={'Complete '+t.title}/>
              <div><p style={{ fontSize:13, fontWeight:600, color:C.text }}>{t.title}</p><p style={{ fontSize:11, color:C.textMuted, marginTop:1 }}>{t.system} &middot; {t.due} &middot; {t.cost}</p></div>
            </div>
            <div className="task-actions">
              {t.pts > 0 && <span className="badge badge-gold">+{t.pts} pts</span>}
              <span className={`badge badge-${t.urgency==='now' ? 'danger' : t.urgency==='soon' ? 'warning' : 'success'}`} style={{ fontSize:10 }}>{t.urgency==='now' ? 'Act Now' : t.urgency==='soon' ? 'Up Next' : 'Watch'}</span>
            </div>
          </li>
        ))}
      </ul>
    </div>
  );
  return (
    <div>
      <div className="sh">
        <div>
          <p className="eyebrow eyebrow-g">Tasks</p>
          <h1 className="serif" style={{ fontSize:26, color:C.green, fontWeight:700 }}>My Tasks</h1>
          <p style={{ fontSize:13, color:C.textMuted, marginTop:2 }}>{now.length} urgent &middot; {soon.length} upcoming &middot; +{tasks.filter(t=>!t.done).reduce((s,t)=>s+t.pts,0)} pts available</p>
        </div>
        <button className="btn btn-primary btn-sm">+ Add Task</button>
      </div>
      <div className="card" style={{ marginBottom:14 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:7 }}>
          <div><p className="eyebrow eyebrow-g">This week's progress</p><p className="serif" style={{ fontSize:16, color:C.green }}>{done.length} of {tasks.length} completed</p></div>
          <span className="badge badge-gold">+{completedPts} pts earned</span>
        </div>
        <div className="meter" style={{ height:9 }}><div className="meter-fill fill-green" style={{ width:Math.round(done.length/tasks.length*100)+'%' }}/></div>
      </div>
      <Group label="Act Now" items={now} color={C.red}/>
      <Group label="Up Next" items={soon} color={C.amber}/>
      <Group label="Watch" items={watch} color={C.textMuted}/>
      {done.length > 0 && (
        <div className="card" style={{ background:C.creamDark }}>
          <p style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.8px', color:C.textMuted, marginBottom:9 }}>Completed &mdash; {done.length}</p>
          <ul className="task-list">
            {done.map(t => (
              <li key={t.id} className="task-item" style={{ opacity:0.55 }}>
                <div style={{ display:'flex', alignItems:'flex-start', gap:9 }}>
                  <input type="checkbox" checked={t.done} onChange={() => toggle(t.id)}/>
                  <div><p style={{ fontSize:13, fontWeight:600, color:C.textMuted, textDecoration:'line-through' }}>{t.title}</p><p style={{ fontSize:11, color:C.textMuted }}>{t.system}</p></div>
                </div>
                {t.pts > 0 && <span className="badge badge-success" style={{ fontSize:10 }}>+{t.pts} pts</span>}
              </li>
            ))}
          </ul>
        </div>
      )}
    </div>
  );
}
