<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#FAF6F0;color:#1A1A1A;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#E4DDD3;border-radius:4px;}
@keyframes pulse {0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes notif{0%{transform:translateX(120%);opacity:0}10%{transform:translateX(0);opacity:1}85%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}
.card{background:#fff;border:1px solid #E4DDD3;border-radius:18px;box-shadow:0 2px 14px rgba(0,0,0,.045);}
.card-gold{background:#fff;border:1px solid rgba(201,150,58,.35);border-radius:18px;box-shadow:0 2px 16px rgba(201,150,58,.08);}
.btn-primary{background:#1C4A2E;color:#fff;border:none;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.2px;transition:all .2s;}
.btn-primary:hover{background:#2D6A4F;transform:translateY(-1px);box-shadow:0 4px 14px rgba(28,74,46,.25);}
.btn-outline{background:transparent;color:#1C4A2E;border:1.5px solid #1C4A2E;padding:8px 18px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-outline:hover{background:#D8F3DC;}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px;}
.nav-btn{display:flex;align-items:center;gap:9px;padding:10px 14px;border-radius:11px;border:none;background:transparent;color:#8A8A8A;font-weight:400;font-size:13px;cursor:pointer;font-family:inherit;text-align:left;transition:all .15s;width:100%;}
.nav-btn:hover{background:#F0E9DC;color:#1A1A1A;}
.nav-btn.active{background:#D8F3DC;color:#1C4A2E;font-weight:600;}
.task-row{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:12px;cursor:pointer;transition:background .15s;}
.task-row:hover{background:#FAF6F0;}
.provider-card{background:#FAF6F0;border:1px solid #E4DDD3;border-radius:14px;padding:16px;transition:all .2s;cursor:pointer;}
.provider-card:hover{border-color:#52B788;background:#fff;box-shadow:0 4px 16px rgba(28,74,46,.08);}
.signal-card:hover{border-color:#52B788!important;transform:translateY(-2px);box-shadow:0 8px 24px rgba(28,74,46,.1)!important;}
.tab-btn:hover{background:#D8F3DC!important;color:#1C4A2E!important;}
select{background:#fff;color:#1A1A1A;border:1px solid #E4DDD3;border-radius:9px;padding:7px 12px;font-size:12px;font-family:inherit;cursor:pointer;outline:none;}
select:hover{border-color:#52B788;}
.hero-house{width:100%;height:200px;border-radius:18px;overflow:hidden;position:relative;background:linear-gradient(135deg,#2D5A3D 0%,#1C4A2E 40%,#3A7D55 70%,#52B788 100%);}
.notif-toast{position:fixed;top:72px;right:20px;z-index:999;animation:notif 5s ease forwards;}
</style>

async function callClaude(system,userMsg){
  const res=await fetch("/.netlify/functions/claude",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages:[{role:"user",content:userMsg}]})
  });
  const data=await res.json();
  return data.content?.[0]?.text||"Unable to load response.";
}

function AIPanel({title,badge,defaultQuote,prompts,systemPrompt,grid2col}){
  const [insight,setInsight]=useState("");
  const [loading,setLoading]=useState(false);
  const [active,setActive]=useState(null);
  const ask=async(q,i)=>{
    setActive(i);setLoading(true);setInsight("");
    try{setInsight(await callClaude(systemPrompt,q));}
    catch{setInsight("Connection error. Please try again.");}
    setLoading(false);
  };
  return (
    <div style={{background:C.green,borderRadius:18,padding:24,color:"#fff"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <div style={{width:32,height:32,borderRadius:9,background:"rgba(255,255,255,0.12)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <Icon name="sparkle" size={16} color={C.goldLight}/>
        </div>
        <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700}}>{title}</span>
        <span style={{marginLeft:"auto",fontSize:10,background:"rgba(255,255,255,0.12)",color:C.goldLight,border:"1px solid rgba(240,201,122,0.3)",padding:"2px 9px",borderRadius:10,letterSpacing:.4}}>{badge||"AI"}</span>
      </div>
      {!insight&&!loading&&<div style={{background:"rgba(255,255,255,0.08)",borderLeft:"3px solid #F0C97A",borderRadius:10,padding:14,marginBottom:14,fontSize:13,lineHeight:1.75,color:"rgba(255,255,255,0.92)",fontStyle:"italic"}}>{defaultQuote}</div>}
      {loading&&<div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 0",marginBottom:14}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"#F0C97A",animation:`pulse 1.2s ease-in-out ${i*.2}s infinite`}}/>)}<span style={{fontSize:12,opacity:.65}}>HOMI is thinking芒聙娄</span></div>}
      {insight&&!loading&&<div style={{background:"rgba(255,255,255,0.08)",borderLeft:"3px solid #F0C97A",borderRadius:10,padding:14,marginBottom:14,fontSize:13,lineHeight:1.8,color:"rgba(255,255,255,0.92)"}}>{insight}</div>}
      <div style={{display:"grid",gridTemplateColumns:grid2col?"1fr 1fr":"1fr",gap:7}}>
        {prompts.map((p,i)=>{
          const label=typeof p==="string"?p:p.label;
          const query=typeof p==="string"?p:p.query;
          return <button key={i} onClick={()=>ask(query,i)} style={{background:active===i?"rgba(255,255,255,0.16)":"rgba(255,255,255,0.07)",border:`1px solid ${active===i?"rgba(240,201,122,0.5)":"rgba(255,255,255,0.12)"}`,borderRadius:9,padding:"9px 13px",color:active===i?"#F0C97A":"rgba(255,255,255,0.78)",fontSize:11,cursor:"pointer",textAlign:"left",fontFamily:"inherit",transition:"all .2s"}}
            onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,0.14)";e.currentTarget.style.color="#F0C97A";}}
            onMouseLeave={e=>{if(active!==i){e.currentTarget.style.background="rgba(255,255,255,0.07)";e.currentTarget.style.color="rgba(255,255,255,0.78)";}}}
          >芒聠聮 {label}</button>;
        })}
      </div>
    </div>
  );
}

// Fresh/Aging/Stale 脗路 Verification Coverage 脗路 Provenance Markers 脗路 Hybrid Cap
// 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬

// System weights
const SYS_WEIGHTS = {
  roof:0.20, hvac:0.20, plumbing:0.15, electrical:0.15,
  water:0.10, exterior:0.10, maintenance:0.10
};

// Decay half-life in months
const DECAY_HALFLIFE = {
  hvac:24, roof:36, water:18, electrical:60, plumbing:60, exterior:48, foundation:120
};

// Fresh/Aging/Stale thresholds per system (months)
const FRESHNESS_THRESHOLDS = {
  hvac:      {fresh:12, aging:24},
  water:     {fresh:12, aging:18},
  roof:      {fresh:18, aging:36},
  electrical:{fresh:36, aging:60},
  plumbing:  {fresh:36, aging:60},
  exterior:  {fresh:24, aging:48},
  foundation:{fresh:60, aging:120},
};
const FRESHNESS_MULTIPLIER = {fresh:1.0, aging:0.80, stale:0.60};
const FRESHNESS_COLOR      = {fresh:"#2D6A4F", aging:"#D97706", stale:"#C0392B"};
const FRESHNESS_BG         = {fresh:"#D8F3DC", aging:"#FEF3C7", stale:"#FDECEA"};

function getFreshnessState(monthsAgo, sysKey){
  const t = FRESHNESS_THRESHOLDS[sysKey] || {fresh:18, aging:36};
  if(monthsAgo == null) return "stale";
  if(monthsAgo <= t.fresh) return "fresh";
  if(monthsAgo <= t.aging) return "aging";
  return "stale";
}

// Continuous multiplier for formula (underneath the display states)
function freshnessMult(monthsAgo, sysKey){
  const hl = DECAY_HALFLIFE[sysKey]||36;
  return Math.max(0.40, 1 - (monthsAgo / (hl * 2)));
}

// Age factor table
function ageFactor(util){
  if(util<=0.30) return 95;
  if(util<=0.50) return 85;
  if(util<=0.70) return 70;
  if(util<=0.85) return 55;
  if(util<=1.00) return 35;
  return 15;
}

const CONDITION_FACTOR = {
  excellent:95, good:85, fair:65, monitor:50, replace:25, safety:10
};

function maintenanceFactor(rate){
  if(rate==null)  return 50;
  if(rate>=0.90)  return 95;
  if(rate>=0.70)  return 80;
  if(rate>=0.50)  return 65;
  if(rate>=0.25)  return 45;
  return 25;
}

const EVENT_FACTOR = {none:90, minor_resolved:75, moderate:50, major:25, safety:10};

// Source confidence
const CONFIDENCE_FACTOR = {
  inspector:95, permit:92, provider:90, document:80,
  owner_photo:70, owner:55, inferred:40
};

// Provenance display config
const SOURCE_CONFIG = {
  inspector: {label:"Inspector verified",   color:"#2D6A4F", bg:"#D8F3DC", icon:"冒聼聰聧"},
  permit:    {label:"Permit record",         color:"#2563A8", bg:"#EBF2FB", icon:"冒聼聯聥"},
  provider:  {label:"Provider confirmed",    color:"#2563A8", bg:"#EBF2FB", icon:"冒聼聰搂"},
  document:  {label:"Document verified",     color:"#C9963A", bg:"#FDF3E0", icon:"冒聼搂戮"},
  owner_photo:{label:"Owner w/ photo",       color:"#D97706", bg:"#FEF3C7", icon:"冒聼聯路"},
  owner:     {label:"Owner reported",        color:"#8A8A8A", bg:"#F5F5F5", icon:"冒聼聭陇"},
  inferred:  {label:"Inferred",              color:"#8A8A8A", bg:"#F5F5F5", icon:"冒聼聯聤"},
};

// Evidence ladder for owner updates
const EVIDENCE_LADDER = [
  {key:"none",       label:"No evidence",          icon:"冒聼聯聺", maxPts:2,  color:"#8A8A8A", bg:"#F5F5F5"},
  {key:"photo",      label:"Photo attached",        icon:"冒聼聯路", maxPts:4,  color:"#D97706", bg:"#FEF3C7"},
  {key:"receipt",    label:"Receipt / invoice",     icon:"冒聼搂戮", maxPts:7,  color:"#C9963A", bg:"#FDF3E0"},
  {key:"contractor", label:"Contractor confirmed",  icon:"冒聼聰搂", maxPts:9,  color:"#2D6A4F", bg:"#D8F3DC"},
  {key:"inspector",  label:"Inspector verified",    icon:"芒聹聟", maxPts:10, color:"#1C4A2E", bg:"#D8F3DC"},
];

const CLIMATE_ADJ = {roof:-3, hvac:-2, plumbing:-1, exterior:-2, water:-1, electrical:0};

function scoreSystem(sys){
  const util = sys.age / sys.expectedLife;
  const af   = ageFactor(util);
  const cf   = CONDITION_FACTOR[sys.condition]||65;
  const mf   = maintenanceFactor(sys.maintenanceRate??null);
  const ef   = EVENT_FACTOR[sys.event||"none"];
  const conf = CONFIDENCE_FACTOR[sys.source||"inferred"];
  return Math.round((af*0.35)+(cf*0.25)+(mf*0.15)+(ef*0.15)+(conf*0.10));
}

function decayedScore(baseScore, monthsAgo, sysKey, inferredBaseline=55){
  const fm = freshnessMult(monthsAgo, sysKey);
  return Math.round(baseScore*fm + inferredBaseline*(1-fm));
}

// Hybrid cap: % cap for high-scoring systems, flat cap for struggling ones
function ownerUpdateCap(verifiedScore){
  return verifiedScore >= 70
    ? verifiedScore * 0.15          // 15% cap  -  prevents inflation on good systems
    : Math.min(10, verifiedScore * 0.20); // flat 10 pts max  -  rewards improvement on struggling ones
}

// Three-tier plausibility gate
function plausibilityGate(ownerUp, verifiedScore){
  const claimedDelta = ownerUp.claimedScore - verifiedScore;
  const cap = ownerUpdateCap(verifiedScore);
  const evEntry = EVIDENCE_LADDER.find(e=>e.key===ownerUp.evidence)||EVIDENCE_LADDER[0];

  if(claimedDelta > 20 && ownerUp.evidence === "none"){
    // Tier 3: Highly suspicious  -  downgrade confidence, minimal impact, flag
    return {delta: Math.min(1, cap), tier:3, flag:true,
      message:"Large improvement claimed without evidence. Upload a receipt or photo to unlock credit."};
  }
  if(claimedDelta > 15){
    // Tier 2: Plausible but unverified  -  capped at 40% of normal, verification prompt
    return {delta: Math.min(evEntry.maxPts * 0.4, cap), tier:2, flag:true,
      message:"Score impact capped until verification. Upload invoice or contractor confirmation to unlock full credit."};
  }
  // Tier 1: Normal  -  full evidence tier credit within cap
  return {delta: Math.min(evEntry.maxPts, cap), tier:1, flag:false, message:null};
}

function computeHomeScore(systems, ownerUpdates=[], maintenanceBehavior=70){
  let verifiedTotal=0, ownerTotal=0, confTotal=0, confCount=0;
  let verifiedSystemCount=0, inferredCount=0, ownerCount=0;
  let freshnessSum=0, freshnessCount=0;
  const breakdown=[];
  const plausibilityFlags=[];

  systems.forEach(sys=>{
    const base      = scoreSystem(sys);
    const decayed   = sys.monthsAgo!=null ? decayedScore(base, sys.monthsAgo, sys.key, 55) : base;
    const climateAdj= CLIMATE_ADJ[sys.key]||0;
    const verifiedScore = Math.max(0, Math.min(100, decayed + climateAdj));
    const weight    = SYS_WEIGHTS[sys.key]||0;
    const freshState= sys.monthsAgo!=null ? getFreshnessState(sys.monthsAgo, sys.key) : "stale";
    const fm        = sys.monthsAgo!=null ? freshnessMult(sys.monthsAgo, sys.key) : 0.4;

    // Track source counts
    if(["inspector","permit","provider","document"].includes(sys.source)) verifiedSystemCount++;
    else if(sys.source==="inferred") inferredCount++;
    else ownerCount++;

    freshnessSum += FRESHNESS_MULTIPLIER[freshState]; freshnessCount++;

    // Owner update
    const ownerUp = ownerUpdates.find(u=>u.sysKey===sys.key);
    let ownerDelta=0, plausFlag=null;
    if(ownerUp){
      const gate = plausibilityGate(ownerUp, verifiedScore);
      ownerDelta = Math.max(0, Math.round(gate.delta * 10)/10);
      plausFlag  = gate;
      if(gate.flag) plausibilityFlags.push({sysKey:sys.key, name:sys.name, ...gate});
    }

    const conf = CONFIDENCE_FACTOR[sys.source||"inferred"];
    verifiedTotal += verifiedScore * weight;
    ownerTotal    += ownerDelta * weight;
    confTotal     += conf * fm;
    confCount++;

    breakdown.push({
      ...sys, base, decayed, verifiedScore, ownerDelta, freshState, freshnessMult:fm,
      finalScore: Math.round(verifiedScore + ownerDelta),
      climateAdj, weight, plausFlag,
    });
  });

  // Maintenance behavior (10% weight)
  verifiedTotal += maintenanceBehavior * (SYS_WEIGHTS.maintenance||0.10);

  const vis = Math.round(verifiedTotal);
  const ownerBoost = Math.round(ownerTotal * 0.25 * 100)/10;
  const oes = Math.min(100, Math.round(vis + ownerBoost));

  // Verification Coverage = verified systems / total systems (as %)
  const verifCoverage = Math.round((verifiedSystemCount / systems.length) * 100);

  // Freshness average
  const avgFreshness = freshnessCount>0 ? freshnessSum/freshnessCount : 0.5;

  // Confidence: blend of source quality, freshness, and inferred ratio
  const avgConf = confCount>0 ? confTotal/confCount : 50;
  const inferredRatio = inferredCount/systems.length;
  const confScore = avgConf * (1 - inferredRatio*0.3) * avgFreshness;
  const confLabel = confScore>=70?"High":confScore>=52?"Moderate":confScore>=38?"Limited":"Low";
  const confColor = confScore>=70?"#2D6A4F":confScore>=52?"#C9963A":confScore>=38?"#D97706":"#C0392B";

  // Score trajectory
  const trajectoryDelta = +4;
  const trajectory = "improving";

  // Anomaly: owner boost > 15 pts on any single system without inspector verify
  const anomaly = plausibilityFlags.some(f=>f.tier>=2);

  return {
    vis, oes, ownerBoost, breakdown, confLabel, confColor, confScore,
    trajectory, trajectoryDelta, anomaly, plausibilityFlags, maintenanceBehavior,
    verifiedSystemCount, inferredCount, ownerCount, verifCoverage, avgFreshness,
    systems
  };
}

function ScoreRing({score}){
  const r=42, circ=2*Math.PI*r;
  const pct=score/100, dash=circ*pct, gap=circ*(1-pct);
  const col=score>=80?C.greenMid:score>=60?C.gold:C.red;
  return(
    <svg width="110" height="110" viewBox="0 0 110 110">
      <circle cx="55" cy="55" r={r} fill="none" stroke={C.creamDark} strokeWidth="9"/>
      <circle cx="55" cy="55" r={r} fill="none" stroke={col} strokeWidth="9"
        strokeDasharray={`${dash} ${gap}`} strokeLinecap="round"
        transform="rotate(-90 55 55)" style={{transition:"stroke-dasharray 1.2s ease"}}/>
      <text x="55" y="50" textAnchor="middle" fontSize="26" fontWeight="700" fill={col} fontFamily="'Playfair Display',serif">{score}</text>
      <text x="55" y="66" textAnchor="middle" fontSize="10" fill={C.textMuted} fontFamily="'DM Sans',sans-serif">/ 100</text>
      <text x="55" y="78" textAnchor="middle" fontSize="9" fill={C.textMuted} fontFamily="'DM Sans',sans-serif">HOME HEALTH</text>
    </svg>
  );
}

            芒聹聯 Save & Next Section 芒聠聮

      </div>
    </div>
  );
}
