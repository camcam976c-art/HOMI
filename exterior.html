<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HOMI — Exterior Systems & Landscaping</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #1C4A2E;
  --green-mid: #2D6A4F;
  --green-light: #52B788;
  --green-pale: #D8F3DC;
  --cream: #FAF6F0;
  --cream-dark: #F0E9DC;
  --gold: #C9963A;
  --gold-light: #E8B84B;
  --gold-pale: #FDF3E0;
  --amber: #D97706;
  --amber-pale: #FEF3C7;
  --amber-border: rgba(217,119,6,0.3);
  --blue: #2563A8;
  --blue-pale: #EBF2FB;
  --red: #C0392B;
  --red-pale: #FDECEA;
  --white: #FFFFFF;
  --text: #1A1A1A;
  --text-muted: #8A8A8A;
  --border: #E4DDD3;
  --radius: 18px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(28,74,46,0.07);
  --shadow-md: 0 6px 28px rgba(28,74,46,0.13);
}
html, body { height: 100%; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
h1,h2,h3,h4 { font-family: 'Playfair Display', serif; }
#root { min-height: 100vh; }
.app-wrap { max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }

/* ─── Topbar ─── */
.topbar { background: var(--green); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(28,74,46,0.22); }
.topbar-logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--white); letter-spacing: 2px; }
.topbar-logo span { color: var(--gold-light); }
.topbar-address { font-size: 12.5px; color: rgba(255,255,255,0.65); }
.topbar-score { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18); border-radius: 24px; padding: 5px 16px; }
.topbar-score-label { font-size: 10.5px; color: rgba(255,255,255,0.6); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
.topbar-score-value { font-size: 19px; font-weight: 700; color: var(--gold-light); font-family: 'Playfair Display', serif; }

/* ─── Prop Header ─── */
.prop-header { background: linear-gradient(135deg, var(--green) 0%, var(--green-mid) 100%); padding: 24px 32px 28px; border-radius: 0 0 var(--radius) var(--radius); margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-end; color: var(--white); }
.prop-header-record { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.45); margin-bottom: 6px; }
.prop-header h1 { font-size: 26px; font-weight: 700; color: var(--white); margin-bottom: 5px; }
.prop-header-sub { font-size: 13px; color: rgba(255,255,255,0.65); }
.prop-meta { display: flex; gap: 22px; }
.prop-meta-item { text-align: right; }
.prop-meta-label { font-size: 9.5px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.5); margin-bottom: 2px; }
.prop-meta-value { font-size: 14px; font-weight: 600; color: var(--white); }

/* ─── Urgent Banner ─── */
.urgent-banner { background: #7C2D12; border: 1.5px solid #9A3412; border-radius: 14px; padding: 14px 18px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; box-shadow: 0 4px 16px rgba(124,45,18,0.18); animation: fadeDown 0.35s ease; }
@keyframes fadeDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.urgent-banner-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.urgent-banner-body { flex: 1; }
.urgent-banner-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #FCA5A5; margin-bottom: 3px; }
.urgent-banner-text { font-size: 13.5px; color: #FEE2E2; font-weight: 500; line-height: 1.45; }
.urgent-banner-text strong { color: #FFFFFF; }
.urgent-banner-cost { display: inline-block; margin-top: 6px; font-size: 12px; font-weight: 700; background: rgba(255,255,255,0.12); color: #FEE2E2; padding: 3px 10px; border-radius: 6px; }

/* ─── Tab Switcher ─── */
.tab-switcher { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background: var(--cream-dark); border: 1px solid var(--border); border-radius: 14px; padding: 5px; margin-bottom: 26px; }
.tab-btn { padding: 13px 18px; border-radius: 10px; border: none; background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--text-muted); transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 9px; text-align: left; }
.tab-btn.active { background: var(--white); color: var(--green); font-weight: 700; box-shadow: var(--shadow-md); border: 1.5px solid var(--green-pale); }
.tab-btn-icon { font-size: 17px; flex-shrink: 0; }
.tab-btn-sub { font-size: 11px; color: var(--text-muted); font-weight: 400; display: block; margin-top: 1px; }
.tab-btn.active .tab-btn-sub { color: var(--green-mid); }

/* ─── Cards ─── */
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); }
.card.urgent-card { border-color: rgba(217,119,6,0.4); border-left: 3px solid var(--amber); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.card-title { font-size: 17px; font-weight: 700; color: var(--green); display: flex; align-items: center; gap: 8px; }

/* ─── Score Feed Footer ─── */
.score-feed { display: flex; align-items: center; gap: 8px; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
.score-feed-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); }
.score-feed-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.score-feed-pill-green { background: var(--green-pale); color: var(--green); border: 1px solid rgba(82,183,136,0.3); }
.score-feed-pill-gold { background: var(--gold-pale); color: var(--gold); border: 1px solid rgba(201,150,58,0.25); }
.score-feed-dot { width: 5px; height: 5px; border-radius: 50%; }
.score-feed-pill-green .score-feed-dot { background: var(--green-light); }
.score-feed-pill-gold .score-feed-dot { background: var(--gold); }

/* ─── Section label ─── */
.section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 12px; }

/* ─── Pills ─── */
.pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 20px; font-size: 11.5px; font-weight: 600; letter-spacing: 0.1px; white-space: nowrap; }
.pill-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.pill-good { background: var(--green-pale); color: var(--green); }
.pill-good .pill-dot { background: var(--green-light); }
.pill-attention { background: var(--amber-pale); color: var(--amber); border: 1px solid var(--amber-border); }
.pill-attention .pill-dot { background: var(--amber); animation: pulse-dot 1.8s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }
.pill-moderate { background: var(--gold-pale); color: var(--gold); }
.pill-moderate .pill-dot { background: var(--gold); }
.pill-low { background: var(--blue-pale); color: var(--blue); }
.pill-low .pill-dot { background: var(--blue); }
.pill-fair { background: #FFF7ED; color: #C2410C; border: 1px solid rgba(194,65,12,0.2); }
.pill-fair .pill-dot { background: #F97316; }
.pill-high { background: var(--red-pale); color: var(--red); border: 1px solid rgba(192,57,43,0.25); }
.pill-high .pill-dot { background: var(--red); animation: pulse-dot 1.4s ease-in-out infinite; }

/* ─── Risk Strip ─── */
.risk-strip { display: grid; grid-template-columns: repeat(6,1fr); gap: 8px; margin-bottom: 20px; }
.risk-item { border-radius: var(--radius-sm); padding: 14px 10px; text-align: center; border: 1.5px solid transparent; transition: transform 0.15s ease; }
.risk-item:hover { transform: translateY(-2px); }
.risk-item-default { background: var(--green); }
.risk-item-alert { background: #431407; border-color: #7C2D12; }
.risk-item-warn { background: #451A03; border-color: #78350F; }
.risk-item-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.9px; font-weight: 700; margin-bottom: 8px; }
.risk-item-default .risk-item-label { color: rgba(255,255,255,0.6); }
.risk-item-alert .risk-item-label { color: #FCA5A5; }
.risk-item-warn .risk-item-label { color: #FDE68A; }
.risk-item-status { display: flex; justify-content: center; margin-bottom: 6px; }
.risk-item-detail { font-size: 9.5px; line-height: 1.3; }
.risk-item-default .risk-item-detail { color: rgba(255,255,255,0.55); }
.risk-item-alert .risk-item-detail { color: #FECACA; }
.risk-item-warn .risk-item-detail { color: #FEF08A; }
.rpill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 10.5px; font-weight: 700; }
.rpill-good { background: rgba(82,183,136,0.25); color: #86EFAC; }
.rpill-good .rpill-dot { background: #4ADE80; }
.rpill-attention { background: rgba(239,68,68,0.25); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.4); }
.rpill-attention .rpill-dot { background: #F87171; animation: pulse-dot 1.4s ease-in-out infinite; }
.rpill-moderate { background: rgba(234,179,8,0.2); color: #FDE68A; }
.rpill-moderate .rpill-dot { background: #FACC15; }
.rpill-low { background: rgba(96,165,250,0.2); color: #BAE6FD; }
.rpill-low .rpill-dot { background: #60A5FA; }
.rpill-fair { background: rgba(249,115,22,0.2); color: #FDBA74; }
.rpill-fair .rpill-dot { background: #F97316; }
.rpill-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* ─── Data rows ─── */
.data-row { display: flex; align-items: flex-start; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid var(--border); gap: 14px; }
.data-row:last-child { border-bottom: none; padding-bottom: 0; }
.data-row-left { flex: 1; }
.data-row-label { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.data-row-note { font-size: 12.5px; color: var(--text-muted); line-height: 1.45; }
.data-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }

/* ─── Callouts ─── */
.callout { border-radius: 10px; padding: 13px 16px; margin-top: 16px; display: flex; gap: 11px; align-items: flex-start; }
.callout-urgent { background: #FFF7ED; border: 1px solid rgba(217,119,6,0.3); border-left: 3px solid var(--amber); }
.callout-info { background: var(--green-pale); border: 1px solid rgba(82,183,136,0.3); border-left: 3px solid var(--green-light); }
.callout-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.callout-text { font-size: 12.5px; color: var(--text); line-height: 1.5; }
.callout-text strong { color: var(--amber); }
.callout-info .callout-text strong { color: var(--green); }
.cost-inline { display: inline-block; font-weight: 700; background: var(--amber-pale); color: var(--amber); padding: 1px 8px; border-radius: 5px; font-size: 12px; margin-left: 3px; }

/* ─── Hardscape ─── */
.hardscape-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.hardscape-item { background: var(--cream); border: 1px solid var(--border); border-radius: 12px; padding: 15px 16px; }
.hardscape-item.needs-attention { border-color: rgba(217,119,6,0.4); background: #FFFBF5; }
.hardscape-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.hardscape-meta { font-size: 11.5px; color: var(--text-muted); margin-bottom: 8px; }
.hardscape-note { font-size: 12.5px; color: var(--text); line-height: 1.4; margin-top: 6px; }
.hardscape-cost { margin-top: 8px; }
.cost-tag { font-size: 12.5px; font-weight: 700; padding: 3px 10px; border-radius: 6px; display: inline-block; }
.cost-tag-amber { background: var(--amber-pale); color: var(--amber); border: 1px solid var(--amber-border); }
.cost-tag-green { background: var(--green-pale); color: var(--green-mid); }

/* ─── Tree proximity ─── */
.tree-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
.tree-card { background: var(--cream); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; cursor: pointer; transition: all 0.18s ease; user-select: none; }
.tree-card:hover { border-color: var(--green-light); box-shadow: var(--shadow-md); }
.tree-card.expanded { border-color: var(--green); background: var(--white); }
.tree-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.tree-card-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
.tree-dist-num { font-size: 26px; font-weight: 700; color: var(--green); font-family: 'Playfair Display', serif; line-height: 1; }
.tree-dist-unit { font-size: 11px; color: var(--text-muted); text-align: right; }
.tree-expand-hint { font-size: 11px; color: var(--green-mid); font-weight: 500; margin-top: 8px; }
.tree-detail { font-size: 12.5px; color: var(--text); line-height: 1.5; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

/* ─── Building Envelope ─── */
.env-inner-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.env-tab { padding: 7px 15px; border-radius: 20px; font-family: 'DM Sans',sans-serif; font-size: 12.5px; font-weight: 500; cursor: pointer; transition: all 0.18s; }
.env-tab-inactive { border: 1.5px solid var(--border); background: var(--white); color: var(--text-muted); }
.env-tab-active { border: none; background: var(--green); color: var(--white); font-weight: 700; }
.envelope-rows { border-top: 1px solid var(--border); margin-top: 10px; }
.envelope-row { display: flex; justify-content: space-between; align-items: baseline; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.envelope-row:last-child { border-bottom: none; padding-bottom: 0; }
.envelope-row-key { color: var(--text-muted); font-weight: 500; }
.envelope-row-val { color: var(--text); font-weight: 600; text-align: right; }
.envelope-row-val.amber { color: var(--amber); }
.envelope-row-val.green { color: var(--green-mid); }

/* ─── Weather Card ─── */
.weather-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 12px; }
.weather-metric { background: var(--cream); border: 1px solid var(--border); border-radius: 12px; padding: 14px 10px; text-align: center; }
.weather-metric-icon { font-size: 22px; margin-bottom: 6px; }
.weather-metric-value { font-size: 20px; font-weight: 700; color: var(--green); font-family: 'Playfair Display', serif; margin-bottom: 2px; line-height: 1; }
.weather-metric-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
.weather-metric-detail { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
.weather-secondary { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-top: 10px; }
.wsec { background: var(--blue-pale); border-radius: 10px; padding: 11px 10px; text-align: center; }
.wsec-label { font-size: 9.5px; color: var(--blue); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; margin-bottom: 4px; }
.wsec-value { font-size: 12.5px; font-weight: 600; color: var(--text); }
.weather-footer { margin-top: 14px; padding: 13px 15px; background: var(--green-pale); border-radius: 10px; font-size: 12.5px; color: var(--green-mid); line-height: 1.6; }
.weather-score-adjustments { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.wscore-tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
.wscore-tag-amber { background: var(--amber-pale); color: var(--amber); }
.wscore-tag-blue { background: var(--blue-pale); color: var(--blue); }

/* ─── AI Advisor Panel ─── */
.ai-panel { background: linear-gradient(135deg, var(--green) 0%, #1a5c38 100%); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; color: var(--white); }
.ai-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.ai-panel-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--white); display: flex; align-items: center; gap: 10px; }
.ai-panel-badge { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); }
.ai-response-box { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 16px; min-height: 80px; font-size: 13.5px; color: rgba(255,255,255,0.92); line-height: 1.65; margin-bottom: 14px; }
.ai-response-box.loading { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.5); font-size: 13px; }
.ai-typing-dots { display: flex; gap: 4px; }
.ai-typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.4); animation: typing-bounce 1.2s ease-in-out infinite; }
.ai-typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.ai-typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
.ai-quick-prompts { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
.ai-quick-btn { padding: 7px 13px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
.ai-quick-btn:hover { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.4); }
.ai-quick-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.ai-input-row { display: flex; gap: 8px; }
.ai-input { flex: 1; padding: 10px 14px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
.ai-input::placeholder { color: rgba(255,255,255,0.4); }
.ai-input:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.14); }
.ai-send-btn { padding: 10px 18px; border-radius: 24px; border: none; background: var(--gold); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.18s; flex-shrink: 0; }
.ai-send-btn:hover { background: var(--gold-light); }
.ai-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ─── Tab 2 Alert banners ─── */
.alert-banner { border-radius: 12px; padding: 13px 16px; margin-bottom: 10px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; animation: fadeDown 0.3s ease; }
.alert-banner.advisory { background: var(--amber-pale); border: 1px solid var(--amber-border); }
.alert-banner.info { background: var(--blue-pale); border: 1px solid rgba(37,99,168,0.2); }
.alert-left { display: flex; gap: 10px; align-items: flex-start; }
.alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.alert-text { font-size: 13px; color: var(--text); line-height: 1.45; }
.alert-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 2px; }
.alert-banner.advisory .alert-badge { color: var(--amber); }
.alert-banner.info .alert-badge { color: var(--blue); }
.alert-dismiss { background: none; border: none; cursor: pointer; font-size: 15px; color: var(--text-muted); padding: 0; }
.alert-dismiss:hover { color: var(--text); }

/* ─── Tree Inventory ─── */
.tree-inv-header { display: grid; grid-template-columns: 1.2fr 0.7fr 0.7fr 0.9fr 1.5fr; gap: 10px; padding-bottom: 8px; border-bottom: 2px solid var(--border); margin-bottom: 2px; }
.tree-inv-col-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
.tree-inv-row { display: grid; grid-template-columns: 1.2fr 0.7fr 0.7fr 0.9fr 1.5fr; gap: 10px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }

function AIAdvisorPanel() {
  const [response, setResponse] = useState("");
  const [loading, setLoading] = useState(false);
  const [input, setInput] = useState("");
  const [hasLoaded, setHasLoaded] = useState(false);
  const inputRef = useRef(null);

  async function callAI(prompt) {
    setLoading(true);
    setResponse("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: "You are HOMI's AI property advisor. This property is at 142 Maple Ridge Drive, Allentown PA 18104. It was built in 2004, is 2,847 sq ft, in IECC Climate Zone 5A (Lehigh Valley PA). The yard has: a Silver Maple 18ft from the house (crown thinning due 2026), a Norway Spruce 35ft away, a Red Oak 42ft away, and 3 Arborvitae with scale insects along the side fence. The lawn has thin coverage in the south zone. There are gutters with partial blockage at the NE corner, and two downspouts discharging within 18\" of the foundation. Keep responses concise, practical, and specific to this property.",
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await res.json();
      const text = data.content && data.content[0] && data.content[0].text;
      setResponse(text || "Sorry, I couldn't get a response. Please try again.");
    } catch(e) {
      setResponse("Unable to connect to the AI advisor right now. Please try again in a moment.");
    }
    setLoading(false);
  }

  useEffect(() => {
    if (!hasLoaded) {
      setHasLoaded(true);
      callAI(AUTO_PROMPT);
    }
  }, []);

  function handleSend() {
    if (!input.trim() || loading) return;
    callAI(input.trim());
    setInput("");
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
  }

  return (
    <div className="ai-panel">
      <div className="ai-panel-header">
        <div className="ai-panel-title">
          <span>✦</span> HOMI AI Advisor
        </div>
        <span className="ai-panel-badge">Powered by Claude</span>
      </div>

      <div className="ai-response-box">
        {loading ? (
          <div className="loading">
            <div className="ai-typing-dots">
              <span></span><span></span><span></span>
            </div>
            <span style={{fontSize:"12px"}}>Thinking about your property…</span>
          </div>
        ) : response ? (
          <span style={{whiteSpace:"pre-wrap"}}>{response}</span>
        ) : (
          <span style={{color:"rgba(255,255,255,0.35)",fontStyle:"italic"}}>Ask anything about your yard, trees, or landscaping…</span>
        )}
      </div>

      <div className="section-label" style={{color:"rgba(255,255,255,0.45)",marginBottom:"8px"}}>Quick questions</div>
      <div className="ai-quick-prompts">
        {AI_QUICK_PROMPTS.map(q => (
          <button key={q} className="ai-quick-btn" disabled={loading} onClick={() => callAI(q)}>{q}</button>
        ))}
      </div>

      <div className="ai-input-row">
        <input
          ref={inputRef}
          className="ai-input"
          placeholder="Ask about your yard, trees, or lawn care…"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={handleKey}
          disabled={loading}
        />
        <button className="ai-send-btn" onClick={handleSend} disabled={loading || !input.trim()}>
          {loading ? "…" : "Ask →"}
        </button>
      </div>
    </div>
  );
}

function AlertsSection({ alertItems }) {

  return (
    <div style={{marginBottom:"20px"}}>

      {visible.map(a => (

    </div>
  );
}
